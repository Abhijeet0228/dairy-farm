<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Jadhav Dairy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .products-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; padding: 2.5rem 0; }
    .filters-sidebar { position: sticky; top: 90px; height: fit-content; }
    .filter-panel { background: white; border-radius: var(--radius-md); padding: 1.5rem; border: 1px solid var(--border-light); }
    .filter-section { margin-bottom: 1.75rem; }
    .filter-section-title { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text); margin-bottom: 0.85rem; }
    .filter-option { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; cursor: pointer; }
    .filter-option input { accent-color: var(--primary); }
    .filter-option label { font-size: 0.875rem; color: var(--text-muted); cursor: pointer; }
    .price-range { display: flex; gap: 0.75rem; }
    .price-range input { flex: 1; }
    .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .products-count { font-size: 0.875rem; color: var(--text-muted); }
    .sort-select { padding: 0.5rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.875rem; color: var(--text); background: white; }
    @media(max-width:900px) { .products-layout { grid-template-columns: 1fr; } .filters-sidebar { position: static; } }
  </style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><div class="brand-logo"><i class="fas fa-cow"></i></div><div><span class="brand-name">Jadhav</span><span class="brand-tagline">Dairy Farm</span></div></a>
    <div class="navbar-nav" id="navMenu">
      <a href="index.html" class="nav-link">Home</a><a href="about.html" class="nav-link">About</a>
      <a href="products.html" class="nav-link active">Products</a><a href="contact.html" class="nav-link">Contact</a>
    </div>
    <div class="navbar-actions">
      <button class="cart-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button>
      <a href="login.html" class="btn btn-secondary btn-sm" id="loginBtn">Login</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="Auth.logout()">Logout</button>
      <button class="hamburger" onclick="document.getElementById('navMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Products</span></div>
    <h1>Our Dairy Products</h1>
    <p>Pure, fresh, and natural — from our farm to your table</p>
  </div>
</div>

<div class="container">
  <div class="products-layout">
    <!-- SIDEBAR FILTERS -->
    <aside class="filters-sidebar">
      <div class="filter-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
          <h3 style="font-size:1rem;font-family:var(--font-body);font-weight:700">Filters</h3>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear All</button>
        </div>
        <div class="filter-section">
          <div class="filter-section-title">Category</div>
          <div id="categoryFilters"><div class="loader" style="padding:1rem"><div class="spinner" style="width:24px;height:24px"></div></div></div>
        </div>
        <div class="filter-section">
          <div class="filter-section-title">Price Range</div>
          <div class="price-range">
            <input type="number" class="form-control" id="minPrice" placeholder="Min ₹" min="0">
            <input type="number" class="form-control" id="maxPrice" placeholder="Max ₹" min="0">
          </div>
          <button class="btn btn-primary btn-sm" style="width:100%;margin-top:0.75rem" onclick="loadProducts()">Apply Price</button>
        </div>
      </div>
    </aside>

    <!-- PRODUCTS GRID -->
    <div>
      <div class="products-header">
        <div>
          <div class="search-bar" style="max-width:320px">
            <i class="fas fa-search"></i>
            <input type="text" class="form-control" id="searchInput" placeholder="Search products..." oninput="debouncedSearch()">
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem">
          <span class="products-count" id="productsCount"></span>
          <select class="sort-select" id="sortSelect" onchange="loadProducts()">
            <option value="name">Name A–Z</option>
            <option value="price">Price Low–High</option>
            <option value="created_at">Newest</option>
          </select>
        </div>
      </div>
      <div class="grid grid-auto" id="productsGrid">
        <div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>
      <div id="paginationBar" style="display:flex;justify-content:center;gap:0.5rem;margin-top:2rem"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer" style="margin-top:3rem">
  <div class="container"><div class="footer-bottom"><p>© 2026 Jadhav Dairy Farm.</p></div></div>
</footer>

<script src="../js/api.js"></script>
<script>
  let categories = [], currentPage = 1, selectedCategory = null;
  const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
  document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+i.quantity, 0);
  const user = api.getUser();
  if (user) { document.getElementById('loginBtn').style.display='none'; document.getElementById('logoutBtn').style.display='inline-flex'; }

  // Check URL param for category
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('cat')) selectedCategory = urlParams.get('cat');

  const debouncedSearch = Utils.debounce(() => { currentPage = 1; loadProducts(); }, 400);

  async function loadCategories() {
    try {
      const data = await api.get('/categories');
      categories = data.categories;
      const container = document.getElementById('categoryFilters');
      container.innerHTML = `<div class="filter-option"><input type="radio" name="cat" id="cat-all" value="" ${!selectedCategory?'checked':''}><label for="cat-all">All Products</label></div>`;
      categories.forEach(c => {
        container.innerHTML += `<div class="filter-option"><input type="radio" name="cat" id="cat-${c.id}" value="${c.id}" ${selectedCategory==c.id?'checked':''}><label for="cat-${c.id}">${c.name} <span style="color:var(--text-light)">(${c.product_count})</span></label></div>`;
      });
      document.querySelectorAll('input[name="cat"]').forEach(r => r.addEventListener('change', () => { selectedCategory = r.value; currentPage = 1; loadProducts(); }));
    } catch(e) { document.getElementById('categoryFilters').innerHTML = '<p style="font-size:0.8rem;color:var(--text-muted)">Could not load</p>'; }
  }

  async function loadProducts() {
    const search = document.getElementById('searchInput').value.trim();
    const sort = document.getElementById('sortSelect').value;
    const minPrice = document.getElementById('minPrice').value;
    const maxPrice = document.getElementById('maxPrice').value;
    let url = `/products?page=${currentPage}&limit=12&sort=${sort}`;
    if (selectedCategory) url += `&category_id=${selectedCategory}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (minPrice) url += `&min_price=${minPrice}`;
    if (maxPrice) url += `&max_price=${maxPrice}`;
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '<div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>';
    try {
      const data = await api.get(url);
      document.getElementById('productsCount').textContent = `${data.total || 0} products`;
      if (!data.products || data.products.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i><h3>No products found</h3><p>Try a different search or category.</p></div>';
        return;
      }
      grid.innerHTML = '';
      const emojis = {1:'🥛',2:'🍶',3:'🥣',4:'🧈',5:'🥐',6:'🧀',7:'🥤',8:'🍦'};
      data.products.forEach(p => {
        const emoji = emojis[p.category_id] || '🥛';
        const inCart = cart.find(i => i.id === p.id);
        grid.innerHTML += `
          <div class="card product-card" onclick="window.location.href='product-detail.html?id=${p.id}'">
            <div style="position:relative">
              ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" style="width:100%;height:200px;object-fit:cover">` : `<div style="height:200px;background:linear-gradient(135deg,var(--cream),var(--border-light));display:flex;align-items:center;justify-content:center;font-size:4rem">${emoji}</div>`}
              ${p.stock_quantity <= 0 ? '<span class="product-badge" style="background:#dc2626">Out of Stock</span>' : ''}
            </div>
            <div class="card-body">
              <div class="product-category">${p.category_name}</div>
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.description||''}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
                <div class="product-price">${Utils.formatCurrency(p.price)} <span>/ ${p.unit}</span></div>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})" ${p.stock_quantity <= 0 ? 'disabled' : ''}><i class="fas fa-cart-plus"></i></button>
              </div>
            </div>
          </div>`;
      });
      // Pagination
      const totalPages = Math.ceil((data.total || 0) / 12);
      const pb = document.getElementById('paginationBar');
      pb.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        pb.innerHTML += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="currentPage=${i};loadProducts()">${i}</button>`;
      }
    } catch(e) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i><h3>Could not load products</h3><p>${e.message}</p></div>`;
    }
  }

  function addToCart(p) {
    const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
    const idx = cart.findIndex(i => i.id === p.id);
    if (idx >= 0) cart[idx].quantity++; else cart.push({...p, quantity:1});
    localStorage.setItem('df_cart', JSON.stringify(cart));
    document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+i.quantity, 0);
    Toast.success(`${p.name} added to cart!`);
  }
  function clearFilters() {
    selectedCategory = null; currentPage = 1;
    document.getElementById('searchInput').value = '';
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    document.querySelector('input[name="cat"]').checked = true;
    loadProducts();
  }
  loadCategories();
  loadProducts();
</script>
</body>
</html>
