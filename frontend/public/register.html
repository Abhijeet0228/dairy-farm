<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Jadhav Dairy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: white; border-radius: var(--radius-xl); padding: 3rem; max-width: 520px; width: 100%; box-shadow: var(--shadow-lg); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.75rem; margin: 0 auto 1rem; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fas fa-cow"></i></div>
    <h2 style="font-size:1.5rem;margin-bottom:0.25rem">Create Your Account</h2>
    <p>Join Jadhav — fresh dairy at your fingertips</p>
  </div>

  <div id="alertBox"></div>

  <form id="registerForm" novalidate>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="name" class="form-control" placeholder="Your full name" required>
        <div class="form-error" id="nameError"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="10-digit mobile">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      <div class="form-error" id="emailError"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Delivery Address</label>
      <textarea id="address" class="form-control" rows="2" placeholder="Your delivery address"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
        <div class="form-error" id="passwordError"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
        <div class="form-error" id="confirmError"></div>
      </div>
    </div>
    <div class="form-group" style="display:flex;align-items:flex-start;gap:0.75rem">
      <input type="checkbox" id="terms" style="margin-top:3px;accent-color:var(--primary)">
      <label for="terms" style="font-size:0.85rem;color:var(--text-muted)">I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a></label>
    </div>
    <div class="form-error" id="termsError"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem" id="regBtn">
      <span id="btnText"><i class="fas fa-user-plus"></i> Create Account</span>
      <span id="btnLoading" style="display:none"><div class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white"></div></span>
    </button>
  </form>

  <p style="text-align:center;font-size:0.875rem;margin-top:1.5rem">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600">Sign in</a></p>
</div>

<script src="../js/api.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;

    ['nameError','emailError','passwordError','confirmError','termsError'].forEach(id => document.getElementById(id).textContent = '');
    let valid = true;
    if (!name) { document.getElementById('nameError').textContent = 'Name is required'; valid = false; }
    if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('emailError').textContent = 'Valid email required'; valid = false; }
    if (!password || password.length < 6) { document.getElementById('passwordError').textContent = 'Min 6 characters'; valid = false; }
    if (password !== confirm) { document.getElementById('confirmError').textContent = 'Passwords do not match'; valid = false; }
    if (!terms) { document.getElementById('termsError').textContent = 'You must accept the terms'; valid = false; }
    if (!valid) return;

    document.getElementById('btnText').style.display = 'none';
    document.getElementById('btnLoading').style.display = 'flex';
    document.getElementById('regBtn').disabled = true;

    try {
      const data = await api.post('/auth/register', { name, email, password, phone, address });
      Auth.login(data.token, data.user);
      Toast.success('Account created! Welcome, ' + name);
      setTimeout(() => window.location.href = '../customer/dashboard.html', 900);
    } catch (err) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> ${err.message}</div>`;
      document.getElementById('btnText').style.display = 'flex';
      document.getElementById('btnLoading').style.display = 'none';
      document.getElementById('regBtn').disabled = false;
    }
  });
</script>
</body>
</html>
