<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Jadhav Dairy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; padding: 2.5rem 0; }
    .cart-item { display: flex; gap: 1.25rem; align-items: center; padding: 1.25rem; border-bottom: 1px solid var(--border-light); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-img { width: 80px; height: 80px; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--cream), var(--border-light)); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; overflow: hidden; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .cart-item-price { color: var(--primary); font-weight: 700; font-size: 0.9rem; }
    .qty-control { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; width: fit-content; }
    .qty-btn { width: 32px; height: 32px; background: var(--bg); border: none; cursor: pointer; font-size: 1rem; color: var(--primary); transition: var(--transition); }
    .qty-btn:hover { background: var(--primary); color: white; }
    .qty-num { width: 40px; text-align: center; font-weight: 700; font-size: 0.9rem; }
    .order-summary { background: white; border-radius: var(--radius-md); padding: 1.75rem; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); position: sticky; top: 90px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; font-size: 0.9rem; }
    .summary-row.total { border-top: 1.5px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; font-weight: 700; font-size: 1.1rem; color: var(--text); }
    @media(max-width:768px) { .cart-layout { grid-template-columns: 1fr; } .order-summary { position: static; } }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><div class="brand-logo"><i class="fas fa-cow"></i></div><div><span class="brand-name">Jadhav</span><span class="brand-tagline">Dairy Farm</span></div></a>
    <div class="navbar-nav" id="navMenu"><a href="products.html" class="nav-link">Continue Shopping</a></div>
    <div class="navbar-actions">
      <button class="cart-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button>
      <a href="login.html" class="btn btn-secondary btn-sm" id="loginBtn">Login</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="Auth.logout()">Logout</button>
      <button class="hamburger" onclick="document.getElementById('navMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="page-header"><div class="container">
  <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Cart</span></div>
  <h1>Shopping Cart</h1>
</div></div>

<div class="container">
  <div class="cart-layout">
    <div>
      <div class="card" id="cartCard"><div id="cartItems"></div></div>
    </div>
    <div>
      <div class="order-summary">
        <h3 style="margin-bottom:1.25rem;font-family:var(--font-body);font-size:1.1rem">Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₹0</span></div>
        <div class="summary-row"><span>Delivery Charges</span><span style="color:#16a34a">FREE</span></div>
        <div class="summary-row"><span>GST (5%)</span><span id="summaryGst">₹0</span></div>
        <div class="summary-row total"><span>Total</span><span id="summaryTotal" style="color:var(--primary)">₹0</span></div>
        <button class="btn btn-primary" style="width:100%;margin-top:1.25rem" onclick="proceedCheckout()"><i class="fas fa-lock"></i> Proceed to Checkout</button>
        <a href="products.html" class="btn btn-secondary" style="width:100%;margin-top:0.75rem"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
        <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:1.25rem;font-size:0.75rem;color:var(--text-light)">
          <i class="fas fa-lock"></i> Secure & encrypted checkout
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:3rem"><div class="container"><div class="footer-bottom"><p>© 2026 Jadhav Dairy Farm.</p></div></div></footer>

<script src="../js/api.js"></script>
<script>
  const user = api.getUser();
  if (user) { document.getElementById('loginBtn').style.display='none'; document.getElementById('logoutBtn').style.display='inline-flex'; }
  const emojis = {1:'🥛',2:'🍶',3:'🥣',4:'🧈',5:'🥐',6:'🧀',7:'🥤',8:'🍦'};

  function renderCart() {
    const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
    document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+i.quantity, 0);
    const container = document.getElementById('cartItems');
    if (cart.length === 0) {
      document.getElementById('cartCard').innerHTML = `<div class="empty-state" style="padding:4rem"><i class="fas fa-shopping-cart"></i><h3>Your cart is empty</h3><p>Add some fresh dairy products!</p><a href="products.html" class="btn btn-primary" style="margin-top:1rem">Shop Now</a></div>`;
      ['summarySubtotal','summaryGst','summaryTotal'].forEach(id => document.getElementById(id).textContent = '₹0');
      return;
    }
    container.innerHTML = '';
    let subtotal = 0;
    cart.forEach((item, idx) => {
      subtotal += item.price * item.quantity;
      const emoji = emojis[item.category_id] || '🥛';
      container.innerHTML += `
        <div class="cart-item">
          <div class="cart-item-img">
            ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : emoji}
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${Utils.formatCurrency(item.price)} / ${item.unit}</div>
            <div style="margin-top:0.5rem;display:flex;align-items:center;gap:1rem">
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
                <span class="qty-num">${item.quantity}</span>
                <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
              </div>
              <span style="font-weight:700;color:var(--text)">${Utils.formatCurrency(item.price * item.quantity)}</span>
            </div>
          </div>
          <button onclick="removeItem(${idx})" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0.5rem;border-radius:8px" title="Remove"><i class="fas fa-trash-alt"></i></button>
        </div>`;
    });
    const gst = subtotal * 0.05;
    const total = subtotal + gst;
    document.getElementById('summarySubtotal').textContent = Utils.formatCurrency(subtotal);
    document.getElementById('summaryGst').textContent = Utils.formatCurrency(gst);
    document.getElementById('summaryTotal').textContent = Utils.formatCurrency(total);
  }

  function changeQty(idx, delta) {
    const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
    cart[idx].quantity = Math.max(1, cart[idx].quantity + delta);
    localStorage.setItem('df_cart', JSON.stringify(cart));
    renderCart();
  }

  function removeItem(idx) {
    const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
    cart.splice(idx, 1);
    localStorage.setItem('df_cart', JSON.stringify(cart));
    renderCart();
    Toast.success('Item removed from cart');
  }

  function proceedCheckout() {
    const cart = JSON.parse(localStorage.getItem('df_cart') || '[]');
    if (cart.length === 0) { Toast.warning('Your cart is empty'); return; }
    if (!user) { Toast.warning('Please login to checkout'); setTimeout(() => window.location.href = 'login.html', 1000); return; }
    window.location.href = 'checkout.html';
  }

  renderCart();
</script>
</body>
</html>
