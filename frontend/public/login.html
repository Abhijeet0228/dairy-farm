<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Jadhav Dairy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: white; border-radius: var(--radius-xl); padding: 3rem; max-width: 440px; width: 100%; box-shadow: var(--shadow-lg); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.75rem; margin: 0 auto 1rem; }
    .auth-logo h2 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .auth-logo p { font-size: 0.875rem; }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0; color: var(--text-light); font-size: 0.8rem; }
    .divider::before,.divider::after { content:''; flex: 1; height: 1px; background: var(--border); }
    .password-toggle { position: relative; }
    .password-toggle .form-control { padding-right: 3rem; }
    .pw-eye { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; }
    .demo-creds { background: var(--cream); border-radius: var(--radius-sm); padding: 1rem; font-size: 0.8rem; margin-top: 1.5rem; }
    .demo-creds h4 { font-size: 0.8rem; margin-bottom: 0.5rem; color: var(--primary); }
    .demo-row { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .demo-row code { background: white; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
    .demo-fill { color: var(--primary); font-size: 0.75rem; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fas fa-cow"></i></div>
    <h2>Welcome Back</h2>
    <p>Sign in to your Jadhav account</p>
  </div>

  <div id="alertBox"></div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div style="position:relative"><i class="fas fa-envelope" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
      <input type="email" id="email" class="form-control" style="padding-left:2.75rem" placeholder="you@example.com" required></div>
      <div class="form-error" id="emailError"></div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between"><span>Password</span><a href="#" style="font-size:0.8rem;color:var(--primary)">Forgot password?</a></label>
      <div class="password-toggle">
        <i class="fas fa-lock" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
        <input type="password" id="password" class="form-control" style="padding-left:2.75rem" placeholder="Enter your password" required>
        <i class="fas fa-eye pw-eye" id="pwToggle" onclick="togglePw()"></i>
      </div>
      <div class="form-error" id="passwordError"></div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">
      <span id="btnText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
      <span id="btnLoading" style="display:none"><div class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white"></div></span>
    </button>
  </form>

  <div class="divider">or</div>
  <p style="text-align:center;font-size:0.875rem">Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600">Sign up free</a></p>

  <div class="demo-creds">
    <h4><i class="fas fa-key"></i> Demo Credentials</h4>
    <div class="demo-row"><span>Admin:</span><code>admin@dairyfarm.com</code><span class="demo-fill" onclick="fillCreds('admin@dairyfarm.com')">Fill</span></div>
    <div class="demo-row"><span>Customer:</span><code>rajesh@example.com</code><span class="demo-fill" onclick="fillCreds('rajesh@example.com')">Fill</span></div>
    <div class="demo-row"><span>Password:</span><code>dairy123</code></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  function togglePw() {
    const i = document.getElementById('password');
    const eye = document.getElementById('pwToggle');
    i.type = i.type === 'password' ? 'text' : 'password';
    eye.className = `fas fa-${i.type === 'password' ? 'eye' : 'eye-slash'} pw-eye`;
  }
  function fillCreds(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'dairy123';
  }
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;
    document.getElementById('emailError').textContent = '';
    document.getElementById('passwordError').textContent = '';
    if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('emailError').textContent = 'Valid email required'; valid = false; }
    if (!password || password.length < 4) { document.getElementById('passwordError').textContent = 'Password required'; valid = false; }
    if (!valid) return;
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('btnLoading').style.display = 'flex';
    document.getElementById('loginBtn').disabled = true;
    try {
      const data = await api.post('/auth/login', { email, password });
      Auth.login(data.token, data.user);
      Toast.success('Welcome back, ' + data.user.name + '!');
      setTimeout(() => {
        if (data.user.role === 'admin' || data.user.role === 'staff') window.location.href = '../admin/dashboard.html';
        else window.location.href = '../customer/dashboard.html';
      }, 800);
    } catch (err) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> ${err.message}</div>`;
      document.getElementById('btnText').style.display = 'flex';
      document.getElementById('btnLoading').style.display = 'none';
      document.getElementById('loginBtn').disabled = false;
    }
  });
</script>
</body>
</html>
