<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Admin | Jadhav Dairy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-cow"></i></div><div class="sidebar-brand">Jadhav<span>Admin Panel</span></div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="products.html" class="sidebar-link"><i class="fas fa-box"></i> Products</a>
      <a href="orders.html" class="sidebar-link"><i class="fas fa-receipt"></i> Orders</a>
      <a href="customers.html" class="sidebar-link active"><i class="fas fa-users"></i> Customers</a>
      <a href="milk-records.html" class="sidebar-link"><i class="fas fa-droplet"></i> Milk Records</a>
      <a href="inventory.html" class="sidebar-link"><i class="fas fa-warehouse"></i> Inventory</a>
      <a href="deliveries.html" class="sidebar-link"><i class="fas fa-truck"></i> Deliveries</a>
      <a href="billing.html" class="sidebar-link"><i class="fas fa-file-invoice"></i> Billing</a>
      <a href="reports.html" class="sidebar-link"><i class="fas fa-chart-line"></i> Reports</a>
      <a href="../public/index.html" class="sidebar-link"><i class="fas fa-globe"></i> View Website</a>
      <a href="#" class="sidebar-link" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-user-avatar" id="adminInitial">A</div><div><div class="sidebar-user-name" id="adminName">Admin</div><div class="sidebar-user-role" id="adminRole">admin</div></div></div></div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><div class="topbar-title">Customer Management</div></div>
      <div class="topbar-right"><button class="btn btn-primary btn-sm" onclick="openCustomerModal()"><i class="fas fa-user-plus"></i> Add Customer</button></div>
    </div>
    <div class="admin-content">
      <div class="data-card">
        <div class="data-card-header">
          <span class="data-card-title">All Customers</span>
          <div class="data-card-actions">
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" class="form-control" id="customerSearch" placeholder="Search name, phone, email..." style="padding-left:2.75rem;width:240px" oninput="loadCustomers()"></div>
            <select class="form-control" id="subFilter" onchange="loadCustomers()" style="width:150px">
              <option value="">All Subscriptions</option>
              <option value="daily">Daily</option><option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option><option value="none">None</option>
            </select>
          </div>
        </div>
        <div id="customersTable"><div class="loader"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal-backdrop" id="customerModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header"><div class="modal-title" id="custModalTitle">Add Customer</div><button class="modal-close" onclick="Utils.closeModal('customerModal')">&times;</button></div>
    <form id="customerForm">
      <input type="hidden" id="customerId">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input type="text" id="cName" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Phone *</label><input type="tel" id="cPhone" class="form-control" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email *</label><input type="email" id="cEmail" class="form-control" required></div>
      <div class="form-group"><label class="form-label">Address</label><textarea id="cAddress" class="form-control" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Subscription Type</label>
          <select id="cSubscription" class="form-control">
            <option value="none">None</option><option value="daily">Daily</option>
            <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
          </select></div>
        <div class="form-group"><label class="form-label">Daily Milk (Litres)</label><input type="number" id="cMilkLiters" class="form-control" min="0" step="0.5" value="0"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="Utils.closeModal('customerModal')">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Customer</button>
      </div>
    </form>
  </div>
</div>

<!-- Customer Detail Modal -->
<div class="modal-backdrop" id="viewModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header"><div class="modal-title">Customer Profile</div><button class="modal-close" onclick="Utils.closeModal('viewModal')">&times;</button></div>
    <div id="customerDetail"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="Utils.closeModal('viewModal')">Close</button></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const user = Auth.requireAdmin();
  if (user) { document.getElementById('adminName').textContent = user.name; document.getElementById('adminRole').textContent = user.role; document.getElementById('adminInitial').textContent = user.name[0]; }
  let editCustId = null;

  const debouncedLoad = Utils.debounce(loadCustomers, 400);

  async function loadCustomers() {
    const search = document.getElementById('customerSearch').value.trim();
    const sub = document.getElementById('subFilter').value;
    let url = '/customers?';
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (sub) url += `&subscription_type=${sub}`;
    try {
      const data = await api.get(url);
      const customers = data.customers;
      if (!customers.length) {
        document.getElementById('customersTable').innerHTML = '<div class="empty-state" style="padding:3rem"><i class="fas fa-users"></i><h3>No customers found</h3></div>';
        return;
      }
      const subBadge = s => ({ daily:'badge-success', weekly:'badge-info', monthly:'badge-warning', none:'badge-secondary' })[s] || 'badge-secondary';
      document.getElementById('customersTable').innerHTML = `
        <div class="table-wrapper"><table><thead><tr><th>Customer</th><th>Phone</th><th>Subscription</th><th>Daily Milk</th><th>Actions</th></tr></thead>
        <tbody>${customers.map(c => `<tr>
          <td><div style="display:flex;align-items:center;gap:0.75rem">
            <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;flex-shrink:0">${c.name[0]}</div>
            <div><div style="font-weight:600;font-size:0.875rem">${c.name}</div><div style="font-size:0.75rem;color:var(--text-muted)">${c.email||'—'}</div></div>
          </div></td>
          <td>${c.phone||'—'}</td>
          <td><span class="badge ${subBadge(c.subscription_type)}">${c.subscription_type}</span></td>
          <td>${c.daily_milk_liters > 0 ? `<strong>${c.daily_milk_liters} L</strong>` : '—'}</td>
          <td><div style="display:flex;gap:0.4rem">
            <button class="btn btn-secondary btn-sm" onclick="viewCustomer(${c.id})" title="View Profile"><i class="fas fa-eye"></i></button>
            <button class="btn btn-primary btn-sm" onclick='editCustomer(${JSON.stringify(c).replace(/'/g,"\\'")})'><i class="fas fa-edit"></i></button>
          </div></td>
        </tr>`).join('')}</tbody></table></div>`;
    } catch(e) {
      document.getElementById('customersTable').innerHTML = `<div class="alert alert-warning" style="margin:1rem"><i class="fas fa-exclamation-triangle"></i> ${e.message}</div>`;
    }
  }

  function openCustomerModal() {
    editCustId = null;
    document.getElementById('custModalTitle').textContent = 'Add Customer';
    document.getElementById('customerForm').reset();
    document.getElementById('customerId').value = '';
    document.getElementById('cEmail').readOnly = false;
    Utils.openModal('customerModal');
  }

  function editCustomer(c) {
    editCustId = c.id;
    document.getElementById('custModalTitle').textContent = 'Edit Customer';
    document.getElementById('customerId').value = c.id;
    document.getElementById('cName').value = c.name;
    document.getElementById('cPhone').value = c.phone || '';
    document.getElementById('cEmail').value = c.email || '';
    document.getElementById('cEmail').readOnly = true;
    document.getElementById('cAddress').value = c.address || '';
    document.getElementById('cSubscription').value = c.subscription_type || 'none';
    document.getElementById('cMilkLiters').value = c.daily_milk_liters || 0;
    Utils.openModal('customerModal');
  }

  async function viewCustomer(id) {
    try {
      const data = await api.get(`/customers/${id}`);
      const c = data.customer;
      const orders = data.orders || [];
      document.getElementById('customerDetail').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Name</div><div style="font-weight:700;font-size:1.1rem">${c.name}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Phone</div><div>${c.phone||'—'}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Email</div><div>${c.email||'—'}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Subscription</div><div><span class="badge badge-success">${c.subscription_type}</span></div></div>
          <div style="grid-column:1/-1"><div style="font-size:0.75rem;color:var(--text-muted)">Address</div><div>${c.address||'—'}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-muted)">Daily Milk</div><div style="font-weight:700;color:var(--primary)">${c.daily_milk_liters} Litres</div></div>
        </div>
        <h4 style="font-size:0.9rem;margin-bottom:0.75rem">Recent Orders (${orders.length})</h4>
        ${orders.length ? `<div class="table-wrapper"><table><thead><tr><th>Order #</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${orders.map(o => `<tr><td style="color:var(--primary);font-weight:600">${o.order_number}</td><td>${Utils.formatCurrency(o.total_amount)}</td><td>${Utils.statusBadge(o.status)}</td><td style="font-size:0.8rem">${Utils.formatDate(o.created_at)}</td></tr>`).join('')}</tbody></table></div>` : '<p style="color:var(--text-muted);font-size:0.875rem">No orders yet.</p>'}`;
      Utils.openModal('viewModal');
    } catch(e) { Toast.error(e.message); }
  }

  document.getElementById('customerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      name: document.getElementById('cName').value,
      phone: document.getElementById('cPhone').value,
      email: document.getElementById('cEmail').value,
      address: document.getElementById('cAddress').value,
      subscription_type: document.getElementById('cSubscription').value,
      daily_milk_liters: document.getElementById('cMilkLiters').value
    };
    try {
      if (editCustId) await api.put(`/customers/${editCustId}`, body);
      else await api.post('/customers', body);
      Utils.closeModal('customerModal');
      Toast.success(editCustId ? 'Customer updated!' : 'Customer created! Default password: dairy123');
      loadCustomers();
    } catch(e) { Toast.error(e.message); }
  });

  loadCustomers();
</script>
</body>
</html>
